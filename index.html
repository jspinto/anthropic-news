<!DOCTYPE html>
<html lang="es">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Anthropic Daily — Noticias del día</title>
<meta name="description" content="Las dos noticias más relevantes sobre Anthropic, resumidas cada día con inteligencia artificial.">

<!-- Fonts -->
<link href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap" rel="stylesheet">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

<!-- Styles -->
<link rel="stylesheet" href="./base.css">
<link rel="stylesheet" href="./style.css">
</head>
<body>
  <div class="page-wrapper">

    <!-- Header -->
    <header class="header">
      <div class="container">
        <a href="#" class="logo" aria-label="Anthropic Daily">
          <svg viewBox="0 0 32 32" fill="none" aria-hidden="true">
            <rect width="32" height="32" rx="6" fill="currentColor" opacity="0.1"/>
            <path d="M8 22L16 10L24 22" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="16" cy="18" r="2" fill="currentColor"/>
          </svg>
          <span class="logo-text">Anthropic Daily</span>
        </a>
        <div class="header-controls">
          <button class="lang-toggle" data-lang-toggle aria-label="Change language">
            <span class="lang-option lang-active" data-lang-label="es">ES</span>
            <span class="lang-separator">/</span>
            <span class="lang-option" data-lang-label="en">EN</span>
          </button>
          <button class="theme-toggle" data-theme-toggle aria-label="Cambiar tema">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
            </svg>
          </button>
        </div>
      </div>
    </header>

    <!-- Main Content -->
    <main>
      <!-- Hero -->
      <section class="hero container" id="hero">
        <p class="hero-date" id="hero-date">Cargando...</p>
        <h1 class="hero-title" id="hero-title">Obteniendo las noticias del día</h1>
      </section>

      <!-- News Cards -->
      <section class="news-section container">
        <div id="news-content">
          <div class="loading-container" id="loading">
            <div class="spinner"></div>
            <p class="loading-text">Consultando a DeepSeek sobre las últimas noticias de Anthropic...</p>
          </div>
        </div>
      </section>
    </main>

    <!-- Footer -->
    <footer class="footer">
      <div class="container">
        <p class="footer-text">
          👦🏻 <a href="https://www.jsph.pro" target="_blank" rel="noopener noreferrer">www.jsph.pro</a>
        </p>
        <p class="footer-powered">
          🤖 <a href="https://deepseek.com" target="_blank" rel="noopener noreferrer">DeepSeek</a>
          + 🔎 <a href="https://serpapi.com" target="_blank" rel="noopener noreferrer">SerpAPI</a>
          + 🚀 <a href="https://railway.com" target="_blank" rel="noopener noreferrer">Railway</a>
          + 💻 <a href="https://perplexity.com" target="_blank" rel="noopener noreferrer">Perplexity</a>
          + 📂 <a href="https://github.com/jspinto/anthropic-news" target="_blank" rel="noopener noreferrer">GitHub</a>
          
        </p>
        <p class="footer-visits" id="visit-counter"></p>
      </div>
    </footer>

  </div>

  <script src="./app.js"></script>
</body>
</html>
